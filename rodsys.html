<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RodSys - Precision Discount System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --deep-space: #0a0f1d;
            --electric-indigo: #6366f1;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            font-family: 'Rajdhani', sans-serif;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
        }

        .futuristic-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .loader {
            border: 3px solid rgba(0, 242, 255, 0.1);
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-futuristic {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-futuristic:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .btn-process-ultra {
            background: rgba(0, 242, 255, 0.05);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
        }

        .btn-process-ultra:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
            transform: scale(1.02);
            text-shadow: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        .neon-yield {
            color: var(--neon-blue);
            text-shadow: 0 0 5px rgba(0, 242, 255, 0.8), 0 0 10px rgba(0, 242, 255, 0.4);
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid var(--neon-blue);
            color: white;
            z-index: 100;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="notification" class="notification"></div>

    <div class="max-w-6xl mx-auto futuristic-card rounded-3xl overflow-hidden border border-white/5">
        <!-- Header -->
        <div class="p-8 border-b border-white/10 bg-black/30 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-5">
                <div class="relative w-20 h-20 flex items-center justify-center bg-gradient-to-br from-blue-600 to-cyan-400 rounded-2xl shadow-[0_0_30px_rgba(0,242,255,0.3)]">
                    <svg viewBox="0 0 100 100" class="w-14 h-14 text-white drop-shadow-md">
                        <rect x="20" y="70" width="60" height="12" rx="2" fill="currentColor" />
                        <line x1="30" y1="70" x2="30" y2="75" stroke="black" stroke-width="1.5" />
                        <rect x="35" y="15" width="30" height="40" rx="3" fill="currentColor" />
                        <path d="M25 60 L25 20 L65 60 Z" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter font-['Orbitron'] text-white neon-text">
                        RodSys <span class="text-cyan-400">PRO</span>
                    </h1>
                    <p class="text-cyan-400/60 text-xs font-bold uppercase tracking-[0.3em]">Advanced Engineering Solutions</p>
                </div>
            </div>
            <div class="text-right hidden md:block">
                <div class="text-[10px] text-white/30 uppercase tracking-widest font-bold">System Status</div>
                <div class="flex items-center gap-2 text-green-400 font-bold text-sm">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> OPERATIONAL
                </div>
            </div>
        </div>

        <div class="p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 relative">
            <!-- Loader -->
            <div id="loading" class="hidden absolute inset-0 bg-slate-950/80 z-50 flex flex-col items-center justify-center rounded-3xl">
                <div class="loader mb-4"></div>
                <p class="text-cyan-400 font-bold tracking-[0.3em] text-xs">ANALYZING DATA...</p>
            </div>

            <!-- Coluna Esquerda: Controlos -->
            <div class="lg:col-span-5 space-y-8">
                <!-- Desconto -->
                <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
                    <label class="block text-[10px] font-bold text-cyan-400 uppercase tracking-widest mb-4">Preset de Desconto</label>
                    <div class="grid grid-cols-5 gap-2 mb-4">
                        <button onclick="setDiscount(5)" class="discount-btn p-2 rounded-lg border border-white/10 hover:border-cyan-400 transition-all text-[10px] font-bold">5%</button>
                        <button onclick="setDiscount(10)" class="discount-btn p-2 rounded-lg border border-white/10 hover:border-cyan-400 transition-all text-[10px] font-bold">10%</button>
                        <button onclick="setDiscount(20)" class="discount-btn p-2 rounded-lg border border-white/10 hover:border-cyan-400 transition-all text-[10px] font-bold">20%</button>
                        <button onclick="setDiscount(30)" class="discount-btn p-2 rounded-lg bg-cyan-500 text-black border-cyan-500 font-bold text-[10px]">30%</button>
                        <button onclick="setDiscount(50)" class="discount-btn p-2 rounded-lg border border-white/10 hover:border-cyan-400 transition-all text-[10px] font-bold">50%</button>
                    </div>
                    <div class="relative group">
                        <input type="number" id="customDiscount" value="30.00" step="0.01" class="w-full glass-input rounded-xl p-4 pr-12 text-xl font-bold font-mono">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-cyan-400 font-bold">%</span>
                    </div>
                </div>

                <!-- Entrada Manual -->
                <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
                    <label class="block text-[10px] font-bold text-cyan-400 uppercase tracking-widest mb-4">Entrada Manual</label>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <span class="text-[10px] text-white/40 block mb-1 font-bold uppercase">Quantidade</span>
                            <input type="number" id="manualQty" value="1" min="1" class="w-full glass-input rounded-xl p-3 font-mono">
                        </div>
                        <div>
                            <span class="text-[10px] text-white/40 block mb-1 font-bold uppercase">Valor Unitário</span>
                            <input type="number" id="manualValue" step="0.01" class="w-full glass-input rounded-xl p-3 font-mono" placeholder="0.00">
                        </div>
                    </div>
                    <button id="addManualBtn" class="w-full btn-futuristic text-white font-bold py-4 rounded-xl text-sm uppercase tracking-widest shadow-lg">Inserir</button>
                </div>

                <!-- Colagem de Dados -->
                <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
                    <label class="block text-[10px] font-bold text-cyan-400 uppercase tracking-widest mb-4">Colagem de Planilha (Excel)</label>
                    <p class="text-[10px] text-white/40 mb-3 italic">Dica: Selecione as colunas 'Qtd' e 'Valor' no Excel e cole aqui.</p>
                    <textarea id="pasteArea" class="glass-input rounded-2xl p-4 text-sm min-h-[120px] font-mono w-full" placeholder="Exemplo:&#10;2  150,00&#10;10  45,90"></textarea>
                    <button id="processPasteBtn" class="w-full btn-process-ultra py-5 mt-4 rounded-2xl font-['Orbitron'] text-xs font-bold uppercase tracking-[0.2em]">
                        Processar Colunas (Qtd | Valor)
                    </button>
                </div>
            </div>

            <!-- Coluna Direita: Resultados -->
            <div class="lg:col-span-7 flex flex-col min-h-[500px]">
                <div id="resultContainer" class="hidden flex-1 flex flex-col bg-black/20 rounded-3xl border border-white/10 overflow-hidden">
                    <div class="p-5 flex justify-between items-center bg-white/5 border-b border-white/10">
                        <h2 class="text-xs font-black uppercase tracking-[0.2em] text-white/80">Result Matrix</h2>
                        <div class="flex gap-4">
                            <button id="clearBtn" class="px-4 py-2 border border-red-500/30 text-red-400 hover:bg-red-500 hover:text-white text-[10px] font-bold uppercase tracking-widest transition-all rounded-lg">Limpar</button>
                            <button id="copyBtn" class="bg-white text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-cyan-400 transition-all">Exportar</button>
                        </div>
                    </div>
                    
                    <div class="overflow-y-auto flex-1">
                        <table class="w-full text-left" id="resultsTable">
                            <thead class="bg-black/40 sticky top-0">
                                <tr>
                                    <th class="p-4 text-[10px] font-bold text-white/40 uppercase tracking-widest text-center">Qty</th>
                                    <th class="p-4 text-[10px] font-bold text-white/40 uppercase tracking-widest">Original</th>
                                    <th id="headerDiscount" class="p-4 text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Final</th>
                                    <th class="p-4 text-[10px] font-bold text-white/40 uppercase tracking-widest text-right">Yield</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>

                <div id="emptyPlaceholder" class="flex-1 flex flex-col items-center justify-center py-24 opacity-20">
                    <svg class="w-20 h-20 text-white mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    <p class="font-['Orbitron'] text-xs tracking-[0.4em] uppercase text-center">Standby Mode</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const notification = document.getElementById('notification');
        const customDiscountInput = document.getElementById('customDiscount');
        const tableBody = document.querySelector('#resultsTable tbody');
        const resultContainer = document.getElementById('resultContainer');
        const emptyPlaceholder = document.getElementById('emptyPlaceholder');

        function showNotification(msg) {
            notification.innerText = msg;
            notification.style.display = 'block';
            setTimeout(() => { notification.style.display = 'none'; }, 3000);
        }

        window.setDiscount = function(val) {
            customDiscountInput.value = val.toFixed(2);
            document.querySelectorAll('.discount-btn').forEach(btn => {
                btn.classList.remove('bg-cyan-500', 'text-black');
                if(btn.innerText === val + '%') btn.classList.add('bg-cyan-500', 'text-black');
            });
        };

        // Lógica de colagem: Qtd primeiro, depois Valor
        document.getElementById('processPasteBtn').onclick = () => {
            const rawText = document.getElementById('pasteArea').value.trim();
            if (!rawText) return;

            const lines = rawText.split('\n');
            const itemsToProcess = [];

            lines.forEach(line => {
                const segments = line.split(/[\t\s]{2,}|[\t;]/).map(s => s.trim()).filter(s => s !== "");
                
                if (segments.length >= 2) {
                    const qtyClean = segments[0].replace(/[^\d]/g, '');
                    const parsedQty = parseInt(qtyClean);
                    const valClean = segments[1].replace(/[R$\s]/g, '').replace(',', '.');
                    const val = parseFloat(valClean);
                    
                    if (!isNaN(val) && !isNaN(parsedQty)) {
                        itemsToProcess.push({ value: val, qty: parsedQty });
                    }
                } else if (segments.length === 1) {
                    const valClean = segments[0].replace(/[R$\s]/g, '').replace(',', '.');
                    const val = parseFloat(valClean);
                    if (!isNaN(val)) {
                        itemsToProcess.push({ value: val, qty: 1 });
                    }
                }
            });

            if (itemsToProcess.length > 0) {
                displayResults(itemsToProcess);
                document.getElementById('pasteArea').value = '';
                showNotification(`${itemsToProcess.length} linhas processadas.`);
            } else {
                showNotification("Nenhum dado válido encontrado.");
            }
        };

        document.getElementById('addManualBtn').onclick = () => {
            const valInput = document.getElementById('manualValue').value;
            const val = parseFloat(valInput.replace(',', '.'));
            const qty = parseInt(document.getElementById('manualQty').value) || 1;
            if (!isNaN(val)) {
                displayResults([{ value: val, qty: qty }]);
                document.getElementById('manualValue').value = '';
                document.getElementById('manualQty').value = '1';
            }
        };

        /**
         * Calcula o MENOR valor possível em centavos que não ultrapassa o desconto percentual.
         * Faz uma busca iterativa (brute-force em escala de centavos) para garantir o valor mais baixo.
         */
        function calculatePreciseDiscount(original, targetPerc) {
            const targetDecimal = targetPerc / 100;
            // Cálculo inicial (arredondamento matemático padrão)
            let currentTarget = original * (1 - targetDecimal);
            
            // Transformamos em centavos inteiros para evitar erros de ponto flutuante
            let centTarget = Math.floor(currentTarget * 100);
            
            // Fazemos uma varredura para encontrar o menor centavo que ainda respeita o limite
            // O desconto real não pode ser MAIOR que o targetPerc
            // Desconto Real = 1 - (Preço_Final / Preço_Original)
            
            let bestValue = centTarget / 100;
            
            // Tentamos baixar o valor em 1 centavo para ver se ainda é válido
            // Se (1 - ((cent - 1)/100) / original) for menor ou igual ao targetDecimal, o valor cent-1 é melhor
            // Usamos uma pequena tolerância (epsilon) para segurança
            const epsilon = 0.0000000001;

            while (true) {
                let nextCent = centTarget - 1;
                let nextVal = nextCent / 100;
                let nextDiscount = 1 - (nextVal / original);
                
                if (nextDiscount <= targetDecimal + epsilon) {
                    centTarget = nextCent;
                    bestValue = nextVal;
                } else {
                    // Se o próximo centavo ultrapassar o desconto permitido, paramos no anterior
                    break;
                }
                
                // Prevenção de loop infinito em valores negativos
                if (centTarget <= 0) break;
            }

            // Caso o arredondamento inicial tenha ficado ACIMA do permitido (raro mas possível)
            // subimos de centavo em centavo até ficar dentro da margem
            while ((1 - (bestValue / original)) > targetDecimal + epsilon) {
                centTarget++;
                bestValue = centTarget / 100;
            }

            return bestValue;
        }

        function displayResults(items) {
            const perc = parseFloat(customDiscountInput.value) || 0;
            resultContainer.classList.remove('hidden');
            emptyPlaceholder.classList.add('hidden');

            items.forEach(item => {
                const finalUnit = calculatePreciseDiscount(item.value, perc);
                const totalFinal = finalUnit * item.qty;
                const realYield = ((1 - (finalUnit / item.value)) * 100).toFixed(4);

                const row = document.createElement('tr');
                row.className = "hover:bg-white/5 border-b border-white/5 group";
                row.innerHTML = `
                    <td class="p-4 text-white/40 font-mono text-xs text-center">${item.qty}x</td>
                    <td class="p-4 text-white/60 font-mono text-xs">R$ ${item.value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    <td class="p-4 text-cyan-400 font-bold font-mono text-sm">
                        ${item.qty > 1 ? `<span class="text-[9px] text-white/20 block font-normal uppercase">Total: R$ ${totalFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>` : ''}
                        R$ ${finalUnit.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                    </td>
                    <td class="p-4 neon-yield font-bold text-[10px] font-mono text-right">${realYield}%</td>
                `;
                tableBody.appendChild(row);
            });
        }

        document.getElementById('clearBtn').onclick = () => {
            tableBody.innerHTML = '';
            resultContainer.classList.add('hidden');
            emptyPlaceholder.classList.remove('hidden');
        };

        document.getElementById('copyBtn').onclick = () => {
            const rows = Array.from(tableBody.querySelectorAll('tr'));
            if (rows.length === 0) return;
            const text = rows.map(tr => {
                const cells = tr.querySelectorAll('td');
                // Pega o valor da célula Final (removendo o prefixo R$)
                const finalValStr = cells[2].innerText.split('R$ ').pop().trim();
                return `${cells[0].innerText}\t${cells[1].innerText}\t${finalValStr}`;
            }).join('\n');
            const el = document.createElement('textarea');
            el.value = "Qtd\tOriginal\tFinal\n" + text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showNotification("Copiado com sucesso!");
        };
    </script>
</body>
</html>
